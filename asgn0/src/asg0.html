<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 0: Vector Library</title> 
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="asg0.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <br>
    <label for="x1Input">v1: x</label>
    <input type="number" id="x1Input" value="0">
    <label for="y1Input">y</label>
    <input type="number" id="y1Input" value="0">
    <br>
    <label for="x2Input">v2: x</label>
    <input type="number" id="x2Input" value="0">
    <label for="y2Input">y</label>
    <input type="number" id="y2Input" value="0">
    <br>
    <input type="button" value="Draw" onclick="handleDrawEvent()">
    <br><br>
    <label for="op">Operation:</label>
    <select id="op">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="mag">Magnitude</option>
      <option value="norm">Normalize</option>
      <option value="ab">Angle Between</option>
      <option value="area">Area</option>
    </select>
    <label for="scalar">Scalar:</label>
    <input type="number" id="scalar" value="1">
    <br>
    <input type="button" value="Apply Operation" onclick="handleDrawOperationEvent()">
  </body>
</html>
